<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositório de Slides | João Gabriel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #000000; /* Fundo totalmente preto */
            --card: #0a0a0a; /* Card levemente cinza para contraste */
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        header { text-align: center; padding: 60px 0; }
        header h1 { font-size: 3rem; letter-spacing: -2px; margin: 0; font-weight: 600; }
        header p { color: #666; margin-top: 10px; font-size: 1.1rem; }

        .container { max-width: 1400px; margin: 0 auto; }

        /* Grid atualizada para cards maiores */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); /* Mínimo de 450px por card */
            gap: 40px;
        }

        /* Estilo do Card ampliado */
        .card {
            background: var(--card);
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .card:hover {
            transform: scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 30px 60px rgba(99, 102, 241, 0.1);
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }

        .card-info { padding: 30px; }
        .card-info h3 { 
            margin: 0; 
            font-size: 1.4rem; 
            text-transform: capitalize; 
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* Visualizador Fullscreen */
        #viewer-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            padding: 0; /* Sem bordas no visualizador */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            z-index: 1001;
            transition: 0.3s;
        }

        .close-btn:hover { background: #ef4444; color: #fff; transform: scale(1.1); }

        .loader { position: absolute; font-size: 0.9rem; color: #444; font-weight: 500; }

        /* Ajuste para telas menores */
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Meus Projetos</h1>
        <p>Apresentações em Alta Definição</p>
    </header>

    <div class="container">
        <div id="file-grid" class="grid"></div>
    </div>

    <div id="viewer-modal">
        <button class="close-btn" onclick="closeViewer()">FECHAR</button>
        <iframe id="pdf-frame"></iframe>
    </div>

    <script>
        const USER = 'codedbyjoaogabriel';
        const REPO = 'repository';
        const FOLDER = 'slides';

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function loadSlides() {
            const grid = document.getElementById('file-grid');
            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
                const files = await response.json();
                const pdfFiles = files.filter(f => f.name.toLowerCase().endsWith('.pdf'));

                if (pdfFiles.length === 0) {
                    grid.innerHTML = '<p>Nenhum arquivo encontrado.</p>';
                    return;
                }

                grid.innerHTML = '';

                pdfFiles.forEach(file => {
                    const cleanName = file.name.replace('.pdf', '').replace(/-/g, ' ');
                    const fileUrl = `https://${USER}.github.io/${REPO}/${FOLDER}/${encodeURIComponent(file.name)}`;
                    const canvasId = `canvas-${file.sha}`;
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="canvas-container">
                            <span class="loader">Processando HD...</span>
                            <canvas id="${canvasId}"></canvas>
                        </div>
                        <div class="card-info">
                            <h3>${cleanName}</h3>
                        </div>
                    `;
                    
                    card.onclick = () => {
                        document.getElementById('pdf-frame').src = fileUrl;
                        document.getElementById('viewer-modal').style.display = 'block';
                        document.body.style.overflow = 'hidden';
                    };
                    
                    grid.appendChild(card);
                    generateThumbnail(fileUrl, canvasId);
                });
            } catch (error) {
                grid.innerHTML = '<p>Erro ao carregar arquivos.</p>';
            }
        }

        async function generateThumbnail(url, canvasId) {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                
                const canvas = document.getElementById(canvasId);
                const context = canvas.getContext('2d');
                
                // Escala maior (1.5) para manter a nitidez no card maior
                const viewport = page.getViewport({ scale: 1.5 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                canvas.parentElement.querySelector('.loader').style.display = 'none';
            } catch (e) {
                console.error(e);
            }
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            document.getElementById('pdf-frame').src = '';
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeViewer(); });
        loadSlides();
    </script>
</body>
</html>

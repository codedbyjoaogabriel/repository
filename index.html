<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositório de Slides HD | João Gabriel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header { text-align: center; padding: 50px 0; }
        header h1 { font-size: 2.5rem; letter-spacing: -1.5px; margin: 0; }
        header p { color: #94a3b8; margin-top: 10px; }

        .container { max-width: 1200px; margin: 0 auto; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Estilo do Card com Capa Automática */
        .card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info { padding: 20px; }
        .card-info h3 { margin: 0; font-size: 1.1rem; text-transform: capitalize; font-weight: 500; }

        /* Visualizador Fullscreen HD */
        #viewer-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            padding: 15px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
            background: #fff;
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 40px;
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .close-btn:hover { background: #ef4444; color: #fff; }

        /* Loader */
        .loader { position: absolute; font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>

    <div class="container">
        <div id="file-grid" class="grid">
            </div>
    </div>

    <div id="viewer-modal">
        <button class="close-btn" onclick="closeViewer()">Fechar</button>
        <iframe id="pdf-frame"></iframe>
    </div>

    <script>
        const USER = 'codedbyjoaogabriel';
        const REPO = 'repository';
        const FOLDER = 'slides';

        // Configuração do PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function loadSlides() {
            const grid = document.getElementById('file-grid');
            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
                const files = await response.json();
                
                // Filtra apenas arquivos PDF
                const pdfFiles = files.filter(f => f.name.toLowerCase().endsWith('.pdf'));

                if (pdfFiles.length === 0) {
                    grid.innerHTML = '<p>Nenhum arquivo PDF encontrado na pasta /slides.</p>';
                    return;
                }

                grid.innerHTML = '';

                pdfFiles.forEach(file => {
                    const cleanName = file.name.replace('.pdf', '').replace(/-/g, ' ');
                    const fileUrl = `https://${USER}.github.io/${REPO}/${FOLDER}/${encodeURIComponent(file.name)}`;
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    const canvasId = `canvas-${file.sha}`;
                    
                    card.innerHTML = `
                        <div class="canvas-container">
                            <span class="loader">Carregando capa...</span>
                            <canvas id="${canvasId}"></canvas>
                        </div>
                        <div class="card-info">
                            <h3>${cleanName}</h3>
                        </div>
                    `;
                    
                    card.onclick = () => {
                        document.getElementById('pdf-frame').src = fileUrl;
                        document.getElementById('viewer-modal').style.display = 'block';
                        document.body.style.overflow = 'hidden';
                    };
                    
                    grid.appendChild(card);
                    generateThumbnail(fileUrl, canvasId);
                });
            } catch (error) {
                grid.innerHTML = '<p>Erro ao carregar repositório. Verifique se a pasta /slides existe.</p>';
            }
        }

        async function generateThumbnail(url, canvasId) {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1); // Captura a primeira página
                
                const canvas = document.getElementById(canvasId);
                const context = canvas.getContext('2d');
                
                const viewport = page.getViewport({ scale: 0.8 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                // Esconde o texto de "Carregando"
                canvas.parentElement.querySelector('.loader').style.display = 'none';
            } catch (e) {
                console.error("Erro na miniatura:", e);
            }
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            document.getElementById('pdf-frame').src = '';
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeViewer(); });
        
        loadSlides();
    </script>
</body>
</html>

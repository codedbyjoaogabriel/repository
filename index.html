<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slides | João Gabriel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{

--bg:#0b0b0f;
--card:#121217;
--card-hover:#1b1b22;
--border:#23232d;

--text:#ffffff;
--sub:#8c8c9a;

--accent:#6366f1;

}

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);

}

/* HEADER */

header{

text-align:center;
padding:70px 20px 50px;

}

header h1{

font-size:3rem;
margin:0;
letter-spacing:-1px;

}

header p{

color:var(--sub);
margin-top:10px;

}

/* SEARCH */

.search{

max-width:600px;
margin:30px auto 0;

}

.search input{

width:100%;
padding:15px 20px;

background:var(--card);

border:1px solid var(--border);

border-radius:12px;

color:white;
font-size:16px;

outline:none;

}

/* CONTAINER */

.container{

max-width:1400px;
margin:auto;
padding:20px;

}

/* SUBJECT */

.subject{

margin-top:80px;

}

.subject h2{

font-size:1.6rem;

margin-bottom:30px;

display:flex;
align-items:center;
gap:10px;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(360px,1fr));

gap:30px;

}

/* CARD */

.card{

background:var(--card);

border:1px solid var(--border);

border-radius:16px;

overflow:hidden;

cursor:pointer;

transition:0.35s;

}

.card:hover{

transform:translateY(-6px);

background:var(--card-hover);

box-shadow:0 20px 40px rgba(0,0,0,0.6);

border-color:var(--accent);

}

/* CANVAS */

.canvas-container{

aspect-ratio:16/9;

background:black;

display:flex;

align-items:center;

justify-content:center;

position:relative;

}

canvas{

width:100%;

height:100%;

}

.loader{

position:absolute;

font-size:12px;

color:#555;

}

/* CARD INFO */

.card-info{

padding:20px;

}

.card-info h3{

margin:0;

font-size:1.2rem;

font-weight:500;

}

.card-info span{

color:var(--sub);

font-size:13px;

}

/* VIEWER */

#viewer-modal{

display:none;

position:fixed;

inset:0;

background:black;

z-index:1000;

}

iframe{

width:100%;

height:100%;

border:none;

background:white;

}

/* CLOSE BUTTON */

.close-btn{

position:absolute;

top:25px;

right:25px;

background:rgba(255,255,255,0.9);

color:black;

border:none;

padding:10px 22px;

border-radius:30px;

font-weight:600;

cursor:pointer;

z-index:1001;

}

.close-btn:hover{

background:#ef4444;
color:white;

}

/* FOOTER */

footer{

text-align:center;

padding:60px 20px;

color:var(--sub);

font-size:14px;

}

/* MOBILE */

@media(max-width:600px){

header h1{
font-size:2rem;
}

}

</style>

</head>

<body>

<header>

<h1>📚 Biblioteca de Slides</h1>

<br/>

<div class="search">
<input id="search" placeholder="Pesquisar slides...">
</div>

</header>

<div class="container" id="subjects"></div>

<div id="viewer-modal">

<button class="close-btn" onclick="closeViewer()">FECHAR</button>

<iframe id="pdf-frame"></iframe>

</div>

<footer>

João Gabriel • Repositório de Estudos

</footer>

<script>

const USER='codedbyjoaogabriel'
const REPO='repository'
const ROOT='slides'

pdfjsLib.GlobalWorkerOptions.workerSrc=
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js'

async function loadSubjects(){

const container=document.getElementById("subjects")

const res=await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${ROOT}`)

const folders=await res.json()

for(const folder of folders){

if(folder.type!=="dir") continue

createSubject(folder)

}

}

async function createSubject(folder){

const container=document.getElementById("subjects")

const section=document.createElement("div")

section.className="subject"

const title=folder.name.replace(/-/g," ")

section.innerHTML=`
<h2>📁 ${title}</h2>
<div class="grid" id="grid-${folder.name}"></div>
`

container.appendChild(section)

const grid=document.getElementById(`grid-${folder.name}`)

const res=await fetch(folder.url)
const files=await res.json()

const pdfs=files.filter(f=>f.name.endsWith(".pdf"))

pdfs.forEach(file=>{

const clean=file.name.replace(".pdf","").replace(/-/g," ")

const url=`https://${USER}.github.io/${REPO}/${ROOT}/${folder.name}/${encodeURIComponent(file.name)}`

const canvasId=`canvas-${file.sha}`

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="canvas-container">

<span class="loader">carregando...</span>

<canvas id="${canvasId}"></canvas>

</div>

<div class="card-info">

<h3>${clean}</h3>

<span>${folder.name}</span>

</div>

`

card.onclick=()=>openPDF(url)

grid.appendChild(card)

generateThumbnail(url,canvasId)

})

}

async function generateThumbnail(url,canvasId){

const pdf=await pdfjsLib.getDocument(url).promise
const page=await pdf.getPage(1)

const canvas=document.getElementById(canvasId)
const ctx=canvas.getContext("2d")

const viewport=page.getViewport({scale:1.5})

canvas.width=viewport.width
canvas.height=viewport.height

await page.render({
canvasContext:ctx,
viewport
}).promise

canvas.parentElement.querySelector(".loader").style.display="none"

}

function openPDF(url){

const frame=document.getElementById("pdf-frame")

frame.src=url+"#toolbar=0&view=FitH"

const modal=document.getElementById("viewer-modal")

modal.style.display="block"

document.body.style.overflow="hidden"

if(modal.requestFullscreen){

modal.requestFullscreen()

}

}

function closeViewer(){

const modal=document.getElementById("viewer-modal")

modal.style.display="none"

document.getElementById("pdf-frame").src=""

document.body.style.overflow="auto"

if(document.fullscreenElement){

document.exitFullscreen()

}

}

document.getElementById("search").addEventListener("input",e=>{

const term=e.target.value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

const text=card.innerText.toLowerCase()

card.style.display=text.includes(term)?"block":"none"

})

})

window.addEventListener("keydown",e=>{
if(e.key==="Escape") closeViewer()
})

loadSubjects()

</script>

</body>
</html>
